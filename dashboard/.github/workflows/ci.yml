name: CI

on:
  push:
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: lint • typecheck • test • build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: dashboard

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20.18
          cache: pnpm
          cache-dependency-path: dashboard/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      # Build with placeholder env values. The bundle leak check below verifies
      # that no real or placeholder server-only secret reaches the client chunks.
      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://ci-placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ci-placeholder-publishable-key-0000000000
          SUPABASE_SECRET_KEY: ci-placeholder-secret-key-00000000000000000
          OPENROUTER_API_KEY: ci-placeholder-openrouter-key-0000000000
          AUTH_SESSION_SECRET: ci-placeholder-32-byte-hex-secret-0000000000000000

      - name: Check bundle for leaked secrets
        run: pnpm check-bundle-secrets
