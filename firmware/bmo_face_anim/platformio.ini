[env:esp32c3_supermini]
; pioarduino fork ships Arduino-ESP32 3.x which fixes the AUTH_EXPIRE
; (reason 2) WiFi association bug that affects the C3 SuperMini on
; standard espressif32 platform 6.x/7.x (Arduino core 2.0.x).
; See https://github.com/pioarduino/platform-espressif32
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
board = esp32-c3-devkitm-1
framework = arduino
upload_port = /dev/cu.usbmodem1401
monitor_port = /dev/cu.usbmodem1401
monitor_speed = 115200
upload_speed = 921600
extra_scripts = pre:scripts/check_secrets_h.py

# Default partition layout. Earlier we tried `min_spiffs.csv` to gain flash
# room; turned out we already had headroom under the default scheme and
# changing partitions invalidates any saved NVS state on the chip, which is
# nasty during development. Keeping the default avoids that footgun.
build_flags =
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -Os

# Arduino-ESP32 ships WiFi.h, WiFiClientSecure.h, HTTPClient.h, WebServer.h,
# DNSServer.h, and Preferences.h with the core; nothing extra needed in
# lib_deps for the brain client or captive portal.
